name: input demo
on:
  workflow_dispatch:
    inputs:
      environment:
        description: choose the environment to deploy to
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
          - testing
      artifact_tag:
        description: choose the tag to deploy
        required: true
        
jobs:
  input-demo:
    runs-on: ubuntu-latest
    steps:
      - name: print environment
        run: echo "deploying to ${{ inputs.environment }}"