name: output step
on:
  push:
    branches:
      - main
jobs:
   build:
     outputs:
       version: ${{ steps.step1.outputs.version }}
     runs-on: ubuntu-latest
     steps:
        - name: step one
          id: step1
          run: echo "version=1.0.0" >> $GITHUB_OUTPUT
        - name: step two
          run: echo "this  version ${{ steps.step1.outputs.version }}"
   test:
     needs: build
     runs-on: ubuntu-latest
     steps:
       - name: build step
         run: echo "testing version ${{ needs.build.outputs.version }}"
